{% set version = "1.1.1" %}

package:
  name: mkdocs-bootstrap
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/mkdocs-bootstrap/mkdocs-bootstrap-{{ version }}.tar.gz
  sha256: c8ec5eb3a1dbd54f8285414a710bd023edb501946a48d9f37de8c835b7f44158

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - mkdocs >=1.1

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - mkdocs_bootstrap

about:
  home: http://www.mkdocs.org
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Bootstrap theme for MkDocs

extra:
  recipe-maintainers:
    - ocefpaf
